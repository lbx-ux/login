mybatis:
  mapper-locations: classpath:mapper/*.xml #指定xml映射文件的位置
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl #配置Mybatis的日志输出，会把执行的SQL打印到控制台
    map-underscore-to-camel-case: true


