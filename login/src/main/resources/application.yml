    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          # 关键点 :强制开启纯 SSL 加密通道
          ssl:
            enable: true
          # 关键点 ：指定使用 Java 内部的 SSL Socket 工厂来建立连接（防止 [EOF] 报错的核心）
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
          starttls:
            enable: false
            required: false
  datasource:
    url: jdbc:mysql://192.168.146.130:3306/test #连接的数据库的名字
    driver-class-name: com.mysql.cj.jdbc.Driver
